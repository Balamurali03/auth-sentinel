name: AuthSentinel CI

on:
  push:
    branches: [ "main" ]
    tags:      [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── Build & Test ──────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: authsentinel-jars
          path: "**/target/*.jar"

  # ── Publish to Maven Central (tag pushes only) ────────────────────────────
  release:
    name: Publish to Maven Central
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Configure Maven settings
        uses: s4u/maven-settings-action@v3.0.0
        with:
          servers: |
            [{
              "id": "central",
              "username": "${{ secrets.CENTRAL_USERNAME }}",
              "password": "${{ secrets.CENTRAL_PASSWORD }}"
            }]

      - name: Deploy to Maven Central
        run: mvn -B clean deploy -Prelease -Dgpg.passphrase="${{ secrets.GPG_PASSPHRASE }}"
