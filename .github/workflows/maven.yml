name: AuthSentinel CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # 3️⃣ Verify Maven wrapper (if using mvnw)
      - name: Make Maven wrapper executable
        run: chmod +x mvnw
        if: ${{ hashFiles('mvnw') != '' }}

      # 4️⃣ Build project
      - name: Build with Maven
        run: mvn -B clean verify

      # 5️⃣ Upload test reports (if any)
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports
            **/target/failsafe-reports

      # 6️⃣ Upload built JARs
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: authsentinel-artifacts
          path: |
            **/target/*.jar
